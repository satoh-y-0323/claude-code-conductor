name: Tests

# Run the full (non-slow) test suite + breaking-changes recording check on
# every push to main and every pull request. Mirrors the local `pytest`
# invocation (pyproject `addopts = -m 'not slow'` excludes the heavy
# fastembed-model tests, so CI does not download the ~220MB model).
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Check breaking changes are recorded
        run: python scripts/extract_breaking_changes.py --check
