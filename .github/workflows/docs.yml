name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build site (--strict catches broken links)
        run: mkdocs build --strict

      # NOTE: upload-pages-artifact / deploy-pages は 2026-05 時点で Node24 版が
      # 未リリース（actions/deploy-pages#410 オープン）。Node20 deprecation 警告が
      # 残るが GitHub 一次 actions のため期限（2026-06-02 強制移行）前に GitHub が
      # 更新する見込み。Node24 版が出たら最新メジャーへ更新する。
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
